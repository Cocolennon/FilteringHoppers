# Modifier ce fichier vous permettra de changer ce que le plugin dit !
# Vous pouvez aussi créer d'autres fichiers de langue pour prendre en charge plus de langues en suivant le même format de nom que mon plugin et Minecraft
# Certains noeuds ont "%s" dans le texte. Ils sont remplacés par des valeurs fournies par le plugin, ne les oubliez pas dans les traductions !

prefix: "<#FF55FF>[<#AA00AA>Filtering Hoppers<#FF55FF>]"
menu-title: "<#AA00AA>Filtering Hoppers<#FFFFFF>: <#FF55FF>Menu de Filtre"
error:
  permission: "<#FF5555>Vous n'avez pas la permission de faire ça !"
  invalid:
    option: "<#FF5555>Vous devez fournir une option valide !"
    number: "<#FF5555>Vous devez fournir un nombre valide !"
    boolean: "<#FF5555>Vous devez fournir un booléen valide !"
    mode: "<#FF5555>Vous devez fournir un mode valide !!"
    radius: "<#FF5555>Vous devez fournir un rayon valide !"
  hoppers: "<#FF5555>Vous pouvez avoir qu'un maximum de %s entonnoirs par chunk!"
  usage: "<#FF5555>Utilisation: /%s <info/reload/max-hoppers-per-chunk/item-collection>"
success:
  reload: "<#AA00AA>Configuration rechargée !"
  max-hoppers: "<#AA00AA>Le nombre d'entonnoirs par chunk est maintenant %s !"
  item-collection:
    toggle:
      enabled: "<#AA00AA>La collection d'objets est maintenant activée !"
      disabled: "<#AA00AA>La collection d'objets est maintenant désactivée !"
    mode:
      chunk: "<#AA00AA>La collection d'objets est maintenant en mode chunk !"
      radius: "<#AA00AA>La collection d'objets est maintenant en mode rayon !"
    radius: "<#AA00AA>Le rayon de la collection d'objets est maintenant de %s blocs !"
filter:
  open: "<#AA00AA>Menu de filtre ouvert avec succès."
  full: "<#FF5555>Le filtre est plein !"
  duplicate: "<#FF5555>Cet objet est déjà dans le filtre !"
  save: "<#AA00AA>Menu de filtre fermé et sauvegardé avec succès."
  mode-item:
    whitelist:
      name: "<#AA00AA>Mode actuel: <#FF55FF>Liste blanche"
      hint: "<#AA00AA>Cliquez pour changer en <#FF55FF>Liste noire"
    blacklist:
      name: "<#AA00AA>Mode actuel: <#FF55FF>Liste noire"
      hint: "<#AA00AA>Cliquez pour changer en <#FF55FF>Liste blanche"
tooltips:
  item-collection-mode:
    chunk: "<#FF55FF>Collecte les objets dans le même chunk que l'entonnoir"
    radius: "<#FF55FF>Collecte les objets dans un rayon autour de l'entonnoir"