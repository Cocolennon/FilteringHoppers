# Editing this file allows you to change what the plugin says!
# You can also create other language files to support more languages, following the same file name format my plugin and Minecraft does!
# Some nodes have "%s" inside. Those are replaced by values provided by the plugin, don't forget to put them in translations too!

prefix: "<#FF55FF>[<#AA00AA>Filtering Hoppers<#FF55FF>]"
menu-title: "<#AA00AA>Filtering Hoppers<#FFFFFF>: <#FF55FF>Filter Menu"
error:
  permission: "<#FF5555>You don't have the permission to do that!"
  invalid:
    option: "<#FF5555>Please provide a valid option to set!"
    number: "<#FF5555>You must provide a valid number!"
    boolean: "<#FF5555>You must provide a valid boolean!"
    mode: "<#FF5555>You must provide a valid mode!"
    radius: "<#FF5555>You must provide a valid radius!"
  hoppers: "<#FF5555>You can only have a maximum of %s hoppers per chunk!"
  usage: "<#FF5555>Usage: /%s <info/reload/max-hoppers-per-chunk/item-collection>"
success:
  reload: "<#AA00AA>Configuration reloaded!"
  max-hoppers: "<#AA00AA>Maximum hoppers per chunk is now %s!"
  item-collection:
    toggle:
      enabled: "<#AA00AA>Item collection is now enabled!"
      disabled: "<#AA00AA>Item collection is now disabled!"
    mode:
      chunk: "<#AA00AA>Item collection is now in chunk mode!"
      radius: "<#AA00AA>Item collection is now in radius mode!"
    radius: "<#AA00AA>Item collection radius is now %s blocks!"
    ignore-y:
      enabled: "<#AA00AA>Radius collection now ignores distance on the Y axis!"
      disabled: "<#AA00AA>Radius collection now counts distance on the Y axis!"
filter:
  open: "<#AA00AA>Successfully opened the filter menu."
  full: "<#FF5555>The filter is full!"
  duplicate: "<#FF5555>This item is already in the filter!"
  save: "<#AA00AA>Successfully closed and saved the filter menu."
  mode-item:
    whitelist:
      name: "<#AA00AA>Current Mode: <#FF55FF>Whitelist"
      hint: "<#AA00AA>Click to change to <#FF55FF>Blacklist"
    blacklist:
      name: "<#AA00AA>Current Mode: <#FF55FF>Blacklist"
      hint: "<#AA00AA>Click to change to <#FF55FF>Whitelist"
tooltips:
  item-collection-mode:
    chunk: "<#FF55FF>Collects items in the same chunk as the hopper"
    radius: "<#FF55FF>Collects items in a radius around the hopper"