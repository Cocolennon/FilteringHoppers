import com.github.jengelman.gradle.plugins.shadow.tasks.ShadowJar

plugins {
    id 'java'
    id "com.gradleup.shadow" version "9.4.1"
}

group = 'me.cocolennon'
version = '1.3.1'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(25)
    }
}

repositories {
    mavenCentral()
    mavenLocal()

    maven {
        name = 'papermc'
        url = 'https://repo.papermc.io/repository/maven-public/'
    }
    maven {
        url = 'https://hub.jeff-media.com/nexus/repository/jeff-media-public/'
    }
}

dependencies {
    compileOnly 'io.papermc.paper:paper-api:26.1.2.build.72-stable'
    implementation 'org.bstats:bstats-bukkit:3.2.1'
    implementation 'com.jeff-media:MorePersistentDataTypes:2.4.0'
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
    options.release.set(25)
}

tasks.named('shadowJar', ShadowJar) {
    relocate 'com.jeff_media.morepersistentdatatypes', 'me.cocolennon.morepersistentdatatypes'
    relocate 'org.bstats', 'me.cocolennon.bstats'
    archiveFileName = "FilteringHoppers-${version}.jar"
    destinationDirectory = file('./builds')
}